# WHY THIS FILE EXISTS
# --------------------
# application.yml configures Spring Boot at startup. Values can also be supplied
# via environment variables — Spring maps "spring.datasource.url" to
# "SPRING_DATASOURCE_URL" automatically. docker-compose.yml sets the env vars,
# so in production / container deployments the YAML defaults are overridden.
#
# The ${VAR:default} syntax means: "use environment variable VAR, or fall back
# to this default if it isn't set" (useful when running locally without Docker).

spring:
  application:
    name: incidentapp

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/incidents}
    username: ${SPRING_DATASOURCE_USERNAME:incident_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}

  jpa:
    hibernate:
      # Flyway now owns the schema (see src/main/resources/db/migration/V*.sql).
      # "validate" tells Hibernate: at startup, compare every @Entity to the live
      # tables and refuse to start if anything is out of sync. It will NEVER
      # create or alter tables — that's exclusively Flyway's job.
      #
      # First-time switch from ddl-auto: update -> validate:
      #   The previous (Hibernate-managed) schema is incompatible with a fresh
      #   Flyway run because Flyway expects an empty DB to apply V1..V4 into.
      #   Wipe the volume once before the first boot:
      #       docker compose down -v && docker compose up --build
      #   After that, normal `docker compose up` is safe — Flyway tracks state
      #   in the flyway_schema_history table.
      ddl-auto: validate
    properties:
      hibernate:
        # Dialect is auto-detected from the JDBC connection (PostgreSQL); setting
        # it explicitly is unnecessary and Hibernate 7 warns about it (HHH90000025).
        format_sql: true
    open-in-view: false  # recommended for web apps; forces you to think about transactions

  # ---------------------------------------------------------------------------
  # Email / SMTP
  # ---------------------------------------------------------------------------
  # Optional: set SPRING_MAIL_HOST (e.g. smtp.mailtrap.io for dev testing,
  # smtp.gmail.com for production) to enable status-change email notifications.
  # When SPRING_MAIL_HOST is not set, Spring Boot will NOT create a JavaMailSender
  # bean, and EmailService will skip sending — the app runs normally without mail.
  #
  # For Mailtrap (free sandbox):
  #   SPRING_MAIL_HOST=sandbox.smtp.mailtrap.io
  #   SPRING_MAIL_PORT=587
  #   SPRING_MAIL_USERNAME=<inbox username from Mailtrap dashboard>
  #   SPRING_MAIL_PASSWORD=<inbox password from Mailtrap dashboard>
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # Flyway picks up V*__*.sql files from classpath:db/migration automatically.
  # Explicit settings here document the defaults so they're easy to find later.
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO
    hr.zavrsni.incidentapp: DEBUG
  # Where logback-spring.xml writes the rolling JSON log file. Override with
  # APP_LOG_DIR (env var) in docker-compose; default is /logs which is a Docker
  # volume mount on the backend service. Local (non-Docker) runs fall back to
  # ./logs in the working directory so we don't try to write to / on Windows.
  file:
    path: ${APP_LOG_DIR:./logs}

# ---------------------------------------------------------------------------
# Spring Boot Actuator
# ---------------------------------------------------------------------------
# By default Actuator exposes only /actuator/health over HTTP, but we set this
# explicitly to make the contract obvious in code review. Anything else (env,
# beans, mappings, configprops, ...) is *disabled* — exposing them would leak
# secrets and internal wiring.
#
# /actuator/health is also wired as permitAll() in SecurityConfig so a load
# balancer or Docker healthcheck can hit it without a JWT. Showing details
# only "when_authorized" keeps DB connection strings out of anonymous probes.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

# Custom config block consumed by AppProperties.java.
app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-secret-change-me-to-a-long-random-string-32chars}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:admin123}

spring.web.error.include-message: always
