# WHY THIS FILE EXISTS
# --------------------
# application.yml configures Spring Boot at startup. Values can also be supplied
# via environment variables — Spring maps "spring.datasource.url" to
# "SPRING_DATASOURCE_URL" automatically. docker-compose.yml sets the env vars,
# so in production / container deployments the YAML defaults are overridden.
#
# The ${VAR:default} syntax means: "use environment variable VAR, or fall back
# to this default if it isn't set" (useful when running locally without Docker).

spring:
  application:
    name: incidentapp

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/incidents}
    username: ${SPRING_DATASOURCE_USERNAME:incident_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}

  jpa:
    hibernate:
      # Flyway now owns the schema (see src/main/resources/db/migration/V*.sql).
      # "validate" tells Hibernate: at startup, compare every @Entity to the live
      # tables and refuse to start if anything is out of sync. It will NEVER
      # create or alter tables — that's exclusively Flyway's job.
      #
      # First-time switch from ddl-auto: update -> validate:
      #   The previous (Hibernate-managed) schema is incompatible with a fresh
      #   Flyway run because Flyway expects an empty DB to apply V1..V4 into.
      #   Wipe the volume once before the first boot:
      #       docker compose down -v && docker compose up --build
      #   After that, normal `docker compose up` is safe — Flyway tracks state
      #   in the flyway_schema_history table.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false  # recommended for web apps; forces you to think about transactions

  # Flyway picks up V*__*.sql files from classpath:db/migration automatically.
  # Explicit settings here document the defaults so they're easy to find later.
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    org.springframework.security: INFO
    hr.zavrsni.incidentapp: DEBUG

# Custom config block consumed by AppProperties.java.
app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-secret-change-me-to-a-long-random-string-32chars}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:admin123}
