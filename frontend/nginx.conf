# WHY THIS FILE EXISTS
# --------------------
# Two jobs:
#   1. Serve the built React SPA (index.html + JS/CSS bundles).
#   2. Reverse-proxy every /api/* request to the Spring Boot container.
#
# Because the browser talks ONLY to nginx on the same origin (http://localhost:8080),
# the React app doesn't need to know the backend's URL and we avoid CORS entirely.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Static assets: serve with long-lived cache (Vite fingerprints filenames).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy: /api/whatever  ->  http://backend:8080/api/whatever
    # "backend" here is the service name from docker-compose.yml.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: any unknown route hands back index.html so React Router
    # can handle client-side routing (e.g. /login, /incidents/new).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
