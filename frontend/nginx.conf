# WHY THIS FILE EXISTS
# --------------------
# Two jobs:
#   1. Serve the built React SPA (index.html + JS/CSS bundles).
#   2. Reverse-proxy every /api/* request to the Spring Boot container.
#
# Because the browser talks ONLY to nginx on the same origin (http://localhost:8080),
# the React app doesn't need to know the backend's URL and we avoid CORS entirely.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers — applied to every response from this server block.
    # Locations that have their own add_header do NOT inherit these automatically
    # (nginx quirk), so /assets/ repeats them below.
    add_header X-Frame-Options           "DENY"               always;
    add_header X-Content-Type-Options    "nosniff"            always;
    add_header Referrer-Policy           "no-referrer"        always;
    # HSTS: tells the browser "only connect via HTTPS for the next year".
    # Harmless on HTTP (dev); active once Caddy terminates TLS in production.
    add_header Strict-Transport-Security "max-age=31536000"   always;

    # Static assets: serve with long-lived cache (Vite fingerprints filenames).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        # Security headers must be repeated here because nginx drops server-level
        # add_header directives once a location block defines its own.
        add_header Cache-Control             "public, immutable";
        add_header X-Frame-Options           "DENY"               always;
        add_header X-Content-Type-Options    "nosniff"            always;
        add_header Referrer-Policy           "no-referrer"        always;
        add_header Strict-Transport-Security "max-age=31536000"   always;
    }

    # Reverse proxy: /api/whatever  ->  http://backend:8080/api/whatever
    # "backend" here is the service name from docker-compose.yml.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Liveness probe — proxied to Spring Boot Actuator. Public on purpose so
    # external uptime monitors / load balancers can poll it without a JWT.
    # The backend's application.yml exposes ONLY /actuator/health (everything
    # else under /actuator/** is disabled), so widening the location prefix
    # here is safe.
    location /actuator/health {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
    }

    # SPA fallback: any unknown route hands back index.html so React Router
    # can handle client-side routing (e.g. /login, /incidents/new).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
